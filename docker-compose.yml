# Local / Dokploy deploy. On Dokploy, prefer setting env via its UI and a
# managed volume; this file is the reference shape.
services:
  mimir:
    build: .
    image: mimir:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    # Supplies OPENROUTER_API_KEY, GITHUB_WEBHOOK_SECRET, GITHUB_TOKEN,
    # MODEL_PRIMARY/MODEL_ESCALATION, POST_NITS, etc. (see .env.example).
    # DATABASE_URL / INTERNAL_BASE_URL default to in-container values.
    env_file: .env
    volumes:
      - mimir-data:/data

volumes:
  mimir-data:
